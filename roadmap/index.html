<title>HouseZoom.ai — Product Roadmap</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06080f;--surface:#0d1117;--surface-2:#151b27;--surface-3:#1c2333;
  --border:rgba(148,163,184,0.08);--border-hover:rgba(148,163,184,0.15);
  --text:#e2e8f0;--text-muted:#94a3b8;--text-dim:#64748b;
  --blue:#3b82f6;--blue-glow:rgba(59,130,246,0.12);
  --green:#10b981;--green-glow:rgba(16,185,129,0.12);
  --amber:#f59e0b;--amber-glow:rgba(245,158,11,0.12);
  --purple:#8b5cf6;--purple-glow:rgba(139,92,246,0.12);
  --rose:#f43f5e;--rose-glow:rgba(244,63,94,0.12);
  --cyan:#06b6d4;--cyan-glow:rgba(6,182,212,0.12);
  --indigo:#6366f1;--indigo-glow:rgba(99,102,241,0.12);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}
.header{padding:40px 24px 20px;text-align:center;position:relative}
.header::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse,rgba(99,102,241,0.08),transparent 70%);pointer-events:none}
.header h1{font-size:28px;font-weight:800;letter-spacing:-0.03em;background:linear-gradient(135deg,#a78bfa,#6366f1,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--text-dim);font-size:13px;margin-top:6px}
.header .stats{display:flex;justify-content:center;gap:24px;margin-top:16px}
.header .stat{text-align:center}
.header .stat-val{font-size:22px;font-weight:800;color:var(--text)}
.header .stat-label{font-size:10px;letter-spacing:0.08em;color:var(--text-dim);text-transform:uppercase;margin-top:2px}
.view-bar{display:flex;justify-content:center;gap:4px;margin:20px auto;max-width:400px;background:var(--surface);border-radius:10px;padding:4px}
.view-btn{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:0.02em;color:var(--text-dim);background:transparent;font-family:inherit;transition:all .2s}
.view-btn.active{color:#fff;background:var(--indigo)}
.view-btn:hover:not(.active){color:var(--text-muted)}
.filter-bar{display:flex;justify-content:center;gap:6px;padding:12px 24px;flex-wrap:wrap}
.filter-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.filter-chip.active{border-color:var(--indigo);color:var(--indigo);background:var(--indigo-glow)}
.filter-chip:hover:not(.active){border-color:var(--border-hover);color:var(--text-muted)}
.kanban{display:grid;grid-template-columns:repeat(5,minmax(260px,1fr));gap:12px;padding:20px 24px;max-width:1600px;margin:0 auto;overflow-x:auto}
@media(max-width:600px){.kanban{grid-template-columns:1fr;overflow-x:visible}}
.column{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.column-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.column-dot{width:10px;height:10px;border-radius:3px}
.column-title{font-size:12px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase}
.column-count{font-size:11px;color:var(--text-dim);margin-left:auto;font-weight:600}
.column-body{padding:8px;max-height:70vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--surface-3) transparent}
.card{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative}
.card:hover{border-color:var(--border-hover);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.card-id{font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:0.05em;font-family:'JetBrains Mono',monospace}
.card-title{font-size:13px;font-weight:700;margin:6px 0 4px;line-height:1.35;color:var(--text)}
.card-desc{font-size:11px;color:var(--text-dim);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.card-tag{font-size:9px;font-weight:700;letter-spacing:0.06em;padding:3px 8px;border-radius:4px;text-transform:uppercase}
.card-date{font-size:10px;color:var(--text-dim);margin-left:auto;font-family:'JetBrains Mono',monospace}
.tag-comms{color:var(--cyan);background:var(--cyan-glow)}
.tag-compliance{color:var(--rose);background:var(--rose-glow)}
.tag-admin{color:var(--purple);background:var(--purple-glow)}
.tag-core{color:var(--blue);background:var(--blue-glow)}
.tag-infra{color:var(--amber);background:var(--amber-glow)}
.tag-ai{color:var(--green);background:var(--green-glow)}
.tag-ux{color:var(--indigo);background:var(--indigo-glow)}
.tag-integrations{color:#ec4899;background:rgba(236,72,153,0.12)}
.col-progress .column-dot{background:var(--amber)}.col-progress .column-header{background:var(--amber-glow)}
.col-next .column-dot{background:var(--blue)}.col-next .column-header{background:var(--blue-glow)}
.col-backlog .column-dot{background:var(--purple)}.col-backlog .column-header{background:var(--purple-glow)}
.col-done .column-dot{background:var(--green)}.col-done .column-header{background:var(--green-glow)}
.col-debt .column-dot{background:var(--rose)}.col-debt .column-header{background:var(--rose-glow)}
.timeline{max-width:900px;margin:0 auto;padding:20px 24px}
.tl-month{margin-bottom:32px}
.tl-month-label{font-size:14px;font-weight:800;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;padding-left:20px;position:relative}
.tl-month-label::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;background:var(--indigo)}
.tl-item{display:flex;gap:16px;padding:10px 0 10px 20px;border-left:2px solid var(--surface-3);margin-left:4px;position:relative}
.tl-item::before{content:'';position:absolute;left:-5px;top:16px;width:8px;height:8px;border-radius:50%;border:2px solid var(--surface-3);background:var(--bg)}
.tl-item.done::before{background:var(--green);border-color:var(--green)}
.tl-item.progress::before{background:var(--amber);border-color:var(--amber)}
.tl-date{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text-dim);min-width:70px;padding-top:2px}
.tl-content{flex:1}.tl-content h4{font-size:13px;font-weight:700;margin-bottom:3px}
.tl-content p{font-size:11px;color:var(--text-dim);line-height:1.5}
.sessions{max-width:900px;margin:0 auto;padding:20px 24px}
.session-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;transition:all .2s}
.session-item:hover{border-color:var(--border-hover)}
.session-date{font-size:12px;font-weight:700;color:var(--indigo);font-family:'JetBrains Mono',monospace}
.session-title{font-size:14px;font-weight:700;margin:6px 0 4px}
.session-decisions{font-size:11px;color:var(--text-dim);line-height:1.6}
.session-decisions strong{color:var(--text-muted);font-weight:600}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:1000;justify-content:center;align-items:center;padding:24px}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:560px;width:100%;max-height:80vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.modal-close:hover{background:var(--surface-2);color:var(--text)}
.modal h3{font-size:16px;font-weight:800;margin-bottom:4px;padding-right:32px}
.modal .card-id{margin-bottom:8px}
.modal .full-desc{font-size:12px;color:var(--text-muted);line-height:1.7;margin:12px 0}
.modal .detail-row{display:flex;gap:8px;margin:6px 0;font-size:11px}
.modal .detail-label{color:var(--text-dim);min-width:60px;font-weight:600}
.modal .detail-value{color:var(--text)}
.footer{text-align:center;padding:40px 24px;color:var(--text-dim);font-size:11px}
.card,.session-item,.tl-item{animation:slideUp .3s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
a.card-tag:hover{opacity:0.8;text-decoration:none}
.atlas-nav{background:#17171a;border-bottom:1px solid #2e2e36;padding:0 32px;display:flex;align-items:center;gap:32px;height:52px;position:sticky;top:0;z-index:100;font-family:'DM Sans',sans-serif}
.atlas-nav-brand{font-size:15px;font-weight:700;color:#e8e8ee;letter-spacing:-0.3px}
.atlas-nav-brand span{color:#7c6af7}
.atlas-nav-links{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.atlas-nav-links a{font-size:13px;color:#9999aa;padding:6px 12px;border-radius:8px;text-decoration:none;transition:all .15s}
.atlas-nav-links a:hover{color:#e8e8ee;background:#1e1e22}
.atlas-nav-links a.active{color:#7c6af7;background:#2a2550}
</style>
</head>

 *
 * Why this exists: D-322/D-323 (2026-05-12/13). Unescaped `<`, `>`, `&`, or quote
 * chars in ROADMAP.md content (e.g. BL-121's `<html dir="rtl">` or BL-125's `<locale>`)
 * silently corrupt the DOM tree. Browser parser closes parent prematurely;
 * subsequent siblings nest as descendants. Visible symptom: "All" filter shows
 * fewer kanban columns than category filters. No console error.
 *
 * Rule: wrap ANY ${expression} sourced from ROADMAP.md / FEATURE-MAP.md /
 * CHANGELOG.md in escapeHtml(). Safe to leave unwrapped: hardcoded enum keys,
 * CSS class names defined in code, counts/indices, JSON.stringify output
 * (which already escapes </>).
 *
 * Verify after any generator change with this DevTools snippet on the live page:
 *   [...document.querySelector('.kanban').children]
 *     .filter(el => el.classList.contains('column')).length

 *
 * Full runbook: docs/debug-runbooks/atlas-rendering.md

function renderCard(item,status){const tag=TAGS[item.tag]||{label:item.tag,color:'blue'};const date=item.completed||item.added||'';return `<div class="card" onclick="showModal('${escapeHtml(item.id)}','${escapeHtml(status)}')"><div class="card-id">${escapeHtml(item.id)}</div><div class="card-title">${escapeHtml(item.title)}</div><div class="card-desc">${escapeHtml(item.desc)}</div><div class="card-meta"><span class="card-tag tag-${tag.color}">${tag.label}</span>${item.files?`<span class="card-tag tag-infra" style="opacity:0.6">📁</span>`:''}${specUrl(item.id, item.title)?`<a href="${specUrl(item.id, item.title)}" target="_blank" onclick="event.stopPropagation()" class="card-tag" style="color:#a78bfa;background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.25);text-decoration:none;cursor:pointer">spec ↗</a>`:''}<span class="card-date">${escapeHtml(date)}</span></div></div>`}
function renderKanban(){const e=document.getElementById('kanbanView'),cols=[{key:'progress',title:'In Progress',items:filterItems(DATA.inProgress),status:'progress'},{key:'next',title:'Next Up',items:filterItems(DATA.nextUp),status:'next'},{key:'backlog',title:'Backlog',items:filterItems(DATA.backlog),status:'backlog'},{key:'debt',title:'Tech Debt & Bugs',items:filterItems([...DATA.techDebt,...DATA.bugs]),status:'debt'},{key:'done',title:'Done',items:filterItems(DATA.done).slice(0,15),status:'done'}];e.innerHTML=cols.map(c=>`<div class="column col-${c.key}"><div class="column-header"><div class="column-dot"></div><div class="column-title">${c.title}</div><div class="column-count">${c.items.length}${c.key==='done'?'+':''}</div></div><div class="column-body">${c.items.map(i=>renderCard(i,c.status)).join('')}${c.items.length===0?'<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:11px">No items</div>':''}</div></div>`).join('')}
function renderTimeline(){const e=document.getElementById('timelineView'),allDone=[...DATA.done].sort((a,b)=>b.completed.localeCompare(a.completed)),months={},monthNames={'01':'January','02':'February','03':'March','04':'April','05':'May','06':'June','07':'July','08':'August','09':'September','10':'October','11':'November','12':'December'};allDone.forEach(i=>{const m=i.completed.substring(0,7);if(!months[m])months[m]=[];months[m].push(i)});DATA.inProgress.forEach(i=>{const m='In Progress';if(!months[m])months[m]=[];months[m].push({...i,_status:'progress'})});let html='';if(months['In Progress']){html+=`<div class="tl-month"><div class="tl-month-label" style="color:var(--amber)">🔨 In Progress</div>${months['In Progress'].map(i=>{const tag=TAGS[i.tag]||{label:i.tag,color:'blue'};return `<div class="tl-item progress"><div class="tl-date">${escapeHtml(i.added)}</div><div class="tl-content"><h4>${escapeHtml(i.id)} — ${escapeHtml(i.title)}</h4><p>${escapeHtml(i.desc)} <span class="card-tag tag-${tag.color}" style="display:inline;font-size:9px;padding:2px 6px">${tag.label}</span></p></div></div>`}).join('')}</div>`;delete months['In Progress']}Object.keys(months).sort().reverse().forEach(m=>{const[y,mo]=m.split('-');const label=`${monthNames[mo]} ${y}`;const items=filterItems(months[m]);if(items.length===0)return;html+=`<div class="tl-month"><div class="tl-month-label">${label}</div>${items.map(i=>{const tag=TAGS[i.tag]||{label:i.tag,color:'blue'};return `<div class="tl-item done"><div class="tl-date">${escapeHtml(i.completed)}</div><div class="tl-content"><h4>${escapeHtml(i.id)} — ${escapeHtml(i.title)}</h4><p>${escapeHtml(i.desc)} <span class="card-tag tag-${tag.color}" style="display:inline;font-size:9px;padding:2px 6px">${tag.label}</span></p></div></div>`}).join('')}</div>`});e.innerHTML=html}
function renderSessions(){const e=document.getElementById('sessionsView');e.innerHTML=DATA.sessions.map(s=>`<div class="session-item"><div class="session-date">${escapeHtml(s.date)}</div><div class="session-title">${escapeHtml(s.title)}</div><div class="session-decisions"><strong>Key decisions:</strong> ${escapeHtml(s.decisions)}</div></div>`).join('')}
function showModal(id,status){const allItems=[...DATA.inProgress,...DATA.nextUp,...DATA.backlog,...DATA.techDebt,...DATA.bugs,...DATA.done];const item=allItems.find(i=>i.id===id);if(!item)return;const tag=TAGS[item.tag]||{label:item.tag,color:'blue'};const statusLabels={progress:'In Progress',next:'Next Up',debt:'Tech Debt / Bug',done:'Done',backlog:'Backlog'};document.getElementById('modalContent').innerHTML=`<div class="card-id">${escapeHtml(item.id)}</div><h3>${escapeHtml(item.title)}</h3><div class="card-meta" style="margin:8px 0 16px"><span class="card-tag tag-${tag.color}">${tag.label}</span><span class="card-tag" style="color:var(--text-muted);background:var(--surface-2)">${escapeHtml(statusLabels[status]||status)}</span></div><div class="full-desc">${escapeHtml(item.desc)}</div>${item.files?`<div class="detail-row"><div class="detail-label">Files</div><div class="detail-value mono" style="font-size:11px">${escapeHtml(item.files)}</div></div>`:''}${specUrl(item.id, item.title)?`<div class="detail-row"><div class="detail-label">Spec</div><div class="detail-value"><a href="${specUrl(item.id, item.title)}" target="_blank" style="color:#a78bfa;font-size:13px;text-decoration:none">View specification on GitHub ↗</a></div></div>`:''}<div class="detail-row"><div class="detail-label">${item.completed?'Completed':'Added'}</div><div class="detail-value mono" style="font-size:11px">${escapeHtml(item.completed||item.added)}</div></div>`;document.getElementById('modal').classList.add('active')}
function closeModal(){document.getElementById('modal').classList.remove('active')}
document.querySelectorAll('.view-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activeView=btn.dataset.view;document.getElementById('kanbanView').style.display=activeView==='kanban'?'':'none';document.getElementById('timelineView').style.display=activeView==='timeline'?'':'none';document.getElementById('sessionsView').style.display=activeView==='sessions'?'':'none';render()})});
document.getElementById('filterBar').addEventListener('click',e=>{if(e.target.classList.contains('filter-chip')){activeFilter=e.target.dataset.filter;render()}});
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
function render(){renderStats();renderFilters();renderKanban();renderTimeline();renderSessions();document.getElementById('lastUpdated').textContent=LAST_UPDATED}
render();
</script>
</body>
</html>
